<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="QinNian 爱豆专属粉丝网站">
    <meta name="author" content="QinNian 粉丝专属">
    <title>QinNian 专属站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        :root {
            --primary-pink: #ffd6dc;
            --accent-red: #ff5c6c;
            --border-red: #ff3b4e;
            --text-main: #333333;
            --text-white: #ffffff;
            --bg-white: #ffffff;
            --mask-bg: rgba(0, 0, 0, 0.6);
            --transition-normal: all 0.3s ease;
            --border-radius-normal: 8px;
            --border-radius-round: 50%;
            --header-height: 100px;
            --header-height-mobile: 80px;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            color: var(--text-main);
            overflow-x: hidden;
        }

        body {
            padding-top: var(--header-height);
        }

        body.no-scroll {
            overflow: hidden;
        }

        /* 顶部导航栏 - 固定定位 */
        header {
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-pink);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .logo {
            font-size: 48px;
            font-weight: 500;
            letter-spacing: 1px;
            color: var(--text-main);
            user-select: none;
            animation: logoSlideIn 0.7s ease forwards;
            flex-shrink: 0;
        }

        @keyframes logoSlideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 右侧容器：账号按钮 + 昵称 */
        .header-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        /* 账号按钮缩小版，圆形 */
        .account-btn {
            width: 50px;
            height: 50px;
            border-radius: var(--border-radius-round);
            background-color: var(--accent-red);
            color: var(--text-white);
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-normal);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            animation: accountPulse 2.5s ease-in-out infinite;
            padding: 0;
            line-height: 1;
        }

        @keyframes accountPulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(255, 92, 108, 0.5);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(255, 92, 108, 0);
            }
        }

        .account-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 14px rgba(255, 92, 108, 0.45);
            animation: none;
        }

        .account-btn:active {
            transform: scale(0.95);
        }

        /* 账号按钮内的头像图片 */
        .account-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            border-radius: var(--border-radius-round);
            position: absolute;
            top: 0;
            left: 0;
        }

        .account-avatar.visible {
            display: block;
        }

        /* 账号按钮内的文字 */
        .account-text {
            position: relative;
            z-index: 1;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .account-text.hidden {
            opacity: 0;
        }

        /* 昵称标签 */
        .user-nickname {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-main);
            text-align: center;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            user-select: none;
            transition: var(--transition-normal);
        }

        /* 页面容器通用样式 */
        .page-container {
            width: 100%;
            min-height: calc(100vh - var(--header-height));
            padding: 30px 40px;
            display: none;
            position: relative;
        }

        .page-container.active {
            display: block;
            animation: pageFadeIn 0.5s ease forwards;
        }

        @keyframes pageFadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 首页样式 */
        .home-title {
            font-size: 32px;
            font-weight: 600;
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
            animation: titleFadeIn 0.6s ease forwards;
        }

        @keyframes titleFadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .home-title::after {
            content: "";
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: var(--border-red);
            border-radius: 2px;
            animation: underlineExpand 0.7s ease forwards;
            transform-origin: left center;
        }

        @keyframes underlineExpand {
            from {
                transform: scaleX(0);
            }
            to {
                transform: scaleX(1);
            }
        }

        .card-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 25px;
        }

        .content-card {
            width: 100%;
            border: 2px solid var(--border-red);
            border-radius: var(--border-radius-normal);
            overflow: hidden;
            background-color: var(--bg-white);
            transition: var(--transition-normal);
            text-decoration: none;
            color: var(--text-main);
            display: block;
            opacity: 0;
            animation: cardFadeInUp 0.55s ease forwards;
            animation-delay: 0.05s;
        }

        @keyframes cardFadeInUp {
            from {
                opacity: 0;
                transform: translateY(28px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content-card:nth-child(n+7):nth-child(-n+12) {
            animation-delay: 0.16s;
        }

        .content-card:nth-child(n+13) {
            animation-delay: 0.27s;
        }

        .content-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 8px 20px rgba(255, 59, 78, 0.25);
        }

        .content-card:active {
            transform: translateY(-2px);
        }

        .card-cover {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
            background-color: #f5f5f5;
            transition: transform 0.4s ease;
        }

        .content-card:hover .card-cover {
            transform: scale(1.04);
        }

        .card-title {
            padding: 12px 10px;
            font-size: 18px;
            text-align: center;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .content-card:hover .card-title {
            color: var(--accent-red);
        }

        /* 个人中心页面样式 */
        .profile-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 40px;
            animation: titleFadeIn 0.5s ease forwards;
        }

        .profile-btn-group {
            position: absolute;
            top: 30px;
            right: 40px;
            display: flex;
            gap: 15px;
            animation: btnGroupFadeIn 0.5s ease forwards;
            z-index: 5;
        }

        @keyframes btnGroupFadeIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-btn {
            padding: 10px 22px;
            background-color: var(--primary-pink);
            border: none;
            border-radius: 4px;
            font-size: 18px;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            transition: var(--transition-normal);
        }

        .profile-btn:hover {
            background-color: #ffc0cb;
            box-shadow: 0 2px 8px rgba(255, 214, 220, 0.6);
        }

        .profile-btn:active {
            transform: scale(0.98);
        }

        /* 头像上传区域 */
        .avatar-form-item {
            margin-bottom: 35px;
            max-width: 600px;
            opacity: 0;
            animation: formItemFadeIn 0.5s ease forwards;
            animation-delay: 0.02s;
        }

        .avatar-preview-wrapper {
            width: 120px;
            height: 120px;
            border-radius: var(--border-radius-round);
            border: 3px dashed var(--border-red);
            cursor: pointer;
            overflow: hidden;
            position: relative;
            transition: var(--transition-normal);
            background-color: #fdf2f3;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-preview-wrapper:hover {
            border-color: var(--accent-red);
            box-shadow: 0 4px 16px rgba(255, 59, 78, 0.2);
            transform: scale(1.03);
        }

        .avatar-preview-wrapper:active {
            transform: scale(0.97);
        }

        .avatar-preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            border-radius: var(--border-radius-round);
        }

        .avatar-preview-img.visible {
            display: block;
        }

        .avatar-placeholder {
            font-size: 14px;
            color: #999;
            text-align: center;
            pointer-events: none;
            user-select: none;
            line-height: 1.3;
            transition: opacity 0.3s ease;
        }

        .avatar-placeholder.hidden {
            opacity: 0;
            position: absolute;
        }

        .avatar-tip {
            margin-top: 8px;
            font-size: 14px;
            color: #666666;
        }

        /* 表单项 */
        .form-item {
            margin-bottom: 35px;
            max-width: 600px;
            opacity: 0;
            animation: formItemFadeIn 0.5s ease forwards;
        }

        .form-item:nth-child(3) {
            animation-delay: 0.08s;
        }
        .form-item:nth-child(4) {
            animation-delay: 0.16s;
        }
        .form-item:nth-child(5) {
            animation-delay: 0.24s;
        }
        .form-item:nth-child(6) {
            animation-delay: 0.28s;
        }

        @keyframes formItemFadeIn {
            from {
                opacity: 0;
                transform: translateX(-16px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form-label {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 12px;
            display: block;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--primary-pink);
            border: none;
            border-radius: 4px;
            font-size: 18px;
            color: var(--text-main);
            outline: none;
            transition: var(--transition-normal);
        }

        .form-input:focus {
            box-shadow: 0 0 0 3px rgba(255, 92, 108, 0.2);
        }

        .form-input:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .form-tip {
            margin-top: 8px;
            font-size: 14px;
            color: #666666;
        }

        .password-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .modify-btn {
            padding: 10px 20px;
            background-color: var(--primary-pink);
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition-normal);
        }

        .modify-btn:hover {
            background-color: #ffc0cb;
        }

        .modify-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .logout-btn {
            width: 100%;
            max-width: 500px;
            padding: 16px 0;
            background-color: var(--primary-pink);
            border: none;
            border-radius: 4px;
            font-size: 22px;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            margin-top: 60px;
            transition: var(--transition-normal);
            opacity: 0;
            animation: formItemFadeIn 0.5s ease forwards;
            animation-delay: 0.34s;
        }

        .logout-btn:hover {
            background-color: #ffb6c1;
            box-shadow: 0 4px 12px rgba(255, 182, 193, 0.5);
        }

        /* 登录弹窗遮罩层 */
        .login-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--mask-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
        }

        .login-mask.hidden {
            display: none;
        }

        .login-modal {
            width: 100%;
            max-width: 900px;
            background-color: var(--bg-white);
            border-radius: var(--border-radius-normal);
            overflow: hidden;
            display: flex;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: modalShow 0.4s ease forwards;
        }

        @keyframes modalShow {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-left {
            width: 40%;
            background-color: var(--primary-pink);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .modal-idol-img {
            width: 100%;
            height: auto;
            object-fit: contain;
            user-select: none;
            animation: idolBreath 3.5s ease-in-out infinite;
        }

        @keyframes idolBreath {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.04);
            }
        }

        .modal-right {
            width: 60%;
            padding: 50px 40px;
        }

        .modal-title {
            font-size: 38px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 35px;
        }

        .login-form-item {
            margin-bottom: 22px;
        }

        .login-form-label {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 8px;
            display: inline-block;
        }

        .login-form-input {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--primary-pink);
            border: none;
            border-radius: 4px;
            font-size: 18px;
            color: var(--text-main);
            outline: none;
            transition: var(--transition-normal);
        }

        .login-form-input:focus {
            box-shadow: 0 0 0 3px rgba(255, 92, 108, 0.2);
        }

        .login-submit-btn {
            width: 100%;
            padding: 15px 0;
            background-color: var(--primary-pink);
            border: none;
            border-radius: 4px;
            font-size: 28px;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            margin: 15px 0 20px 0;
            transition: var(--transition-normal);
            position: relative;
            overflow: hidden;
        }

        .login-submit-btn:hover {
            background-color: #ffc0cb;
            box-shadow: 0 4px 12px rgba(255, 192, 203, 0.5);
        }

        .login-submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-submit-btn::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease, opacity 0.6s ease;
            pointer-events: none;
        }

        .login-submit-btn:active::after {
            width: 300px;
            height: 300px;
            opacity: 0;
        }

        .agreement-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .agreement-checkbox {
            width: 20px;
            height: 20px;
            accent-color: var(--accent-red);
            cursor: pointer;
        }

        .agreement-text {
            font-size: 16px;
            color: #333333;
            user-select: none;
        }

        /* 提示框样式 */
        .toast {
            position: fixed;
            top: 120px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            z-index: 1100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toast.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background-color: #f0f9ff;
            color: #0066cc;
            border: 1px solid #b3d9ff;
        }

        .toast.error {
            background-color: #fff2f0;
            color: #cf1322;
            border: 1px solid #ffccc7;
        }

        /* 密码修改弹窗样式 */
        .password-modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--mask-bg);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            padding: 20px;
        }

        .password-modal-mask.show {
            display: flex;
        }

        .password-modal {
            width: 100%;
            max-width: 500px;
            background-color: var(--bg-white);
            border-radius: var(--border-radius-normal);
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: modalShow 0.3s ease forwards;
        }

        .password-modal-title {
            font-size: 26px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
        }

        .password-modal-btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .password-modal-btn {
            flex: 1;
            padding: 12px 0;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-normal);
        }

        .btn-cancel {
            background-color: #f5f5f5;
            color: #666666;
        }

        .btn-cancel:hover {
            background-color: #e8e8e8;
        }

        .btn-confirm {
            background-color: var(--primary-pink);
            color: var(--text-main);
        }

        .btn-confirm:hover {
            background-color: #ffc0cb;
        }

        /* 响应式适配 - 平板端 */
        @media screen and (max-width: 1200px) {
            .card-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
            }

            .logo {
                font-size: 40px;
            }

            .account-btn {
                width: 45px;
                height: 45px;
                font-size: 13px;
            }

            header {
                padding: 0 30px;
                height: 90px;
            }

            :root {
                --header-height: 90px;
            }

            body {
                padding-top: 90px;
            }

            .page-container {
                padding: 25px 30px;
                min-height: calc(100vh - 90px);
            }

            .user-nickname {
                font-size: 12px;
                max-width: 70px;
            }

            .header-right {
                gap: 4px;
            }

            @keyframes accountPulse {
                0%,
                100% {
                    box-shadow: 0 0 0 0 rgba(255, 92, 108, 0.5);
                }
                50% {
                    box-shadow: 0 0 0 8px rgba(255, 92, 108, 0);
                }
            }
        }

        /* 响应式适配 - 手机端 */
        @media screen and (max-width: 768px) {
            header {
                height: var(--header-height-mobile);
                padding: 0 20px;
            }

            :root {
                --header-height: var(--header-height-mobile);
            }

            body {
                padding-top: var(--header-height-mobile);
            }

            .logo {
                font-size: 36px;
            }

            .account-btn {
                width: 40px;
                height: 40px;
                font-size: 12px;
                animation: accountPulseMobile 2.5s ease-in-out infinite;
            }

            @keyframes accountPulseMobile {
                0%,
                100% {
                    box-shadow: 0 0 0 0 rgba(255, 92, 108, 0.5);
                }
                50% {
                    box-shadow: 0 0 0 7px rgba(255, 92, 108, 0);
                }
            }

            .user-nickname {
                font-size: 11px;
                max-width: 60px;
            }

            .header-right {
                gap: 3px;
            }

            .page-container {
                padding: 20px;
                min-height: calc(100vh - var(--header-height-mobile));
            }

            .home-title {
                font-size: 24px;
                margin-bottom: 20px;
            }

            .card-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 18px;
            }

            .card-title {
                font-size: 16px;
                padding: 10px 8px;
            }

            .content-card:nth-child(n+3):nth-child(-n+4) {
                animation-delay: 0.16s;
            }
            .content-card:nth-child(n+5):nth-child(-n+6) {
                animation-delay: 0.27s;
            }
            .content-card:nth-child(n+7) {
                animation-delay: 0.38s;
            }

            .profile-title {
                font-size: 24px;
                margin-bottom: 30px;
            }

            .profile-btn-group {
                position: static;
                margin-bottom: 30px;
                justify-content: flex-end;
            }

            .profile-btn {
                padding: 8px 16px;
                font-size: 16px;
            }

            .form-label {
                font-size: 20px;
            }

            .form-input {
                font-size: 16px;
                padding: 10px 14px;
            }

            .logout-btn {
                font-size: 18px;
                padding: 12px 0;
                margin-top: 40px;
            }

            .avatar-preview-wrapper {
                width: 100px;
                height: 100px;
            }

            .login-modal {
                flex-direction: column;
                max-width: 100%;
            }

            .modal-left {
                width: 100%;
                height: 200px;
                padding: 20px;
            }

            .modal-idol-img {
                max-height: 160px;
                width: auto;
            }

            .modal-right {
                width: 100%;
                padding: 30px 25px;
            }

            .modal-title {
                font-size: 28px;
                margin-bottom: 25px;

    <script>
        // 全局DOM元素获取
        const DOM = {
            // 登录相关
            loginMask: document.getElementById('loginMask'),
            loginAccount: document.getElementById('loginAccount'),
            loginPassword: document.getElementById('loginPassword'),
            loginInviteCode: document.getElementById('loginInviteCode'),
            agreementCheck: document.getElementById('agreementCheck'),
            loginSubmitBtn: document.getElementById('loginSubmitBtn'),
            // 页面切换相关
            homePage: document.getElementById('homePage'),
            profilePage: document.getElementById('profilePage'),
            accountBtn: document.getElementById('accountBtn'),
            backBtn: document.getElementById('backBtn'),
            // 个人中心相关
            nicknameInput: document.getElementById('nicknameInput'),
            qinnianIdInput: document.getElementById('qinnianIdInput'),
            passwordInput: document.getElementById('passwordInput'),
            saveBtn: document.getElementById('saveBtn'),
            cancelBtn: document.getElementById('cancelBtn'),
            modifyPwdBtn: document.getElementById('modifyPwdBtn'),
            logoutBtn: document.getElementById('logoutBtn'),
            // 密码修改弹窗相关
            passwordModalMask: document.getElementById('passwordModalMask'),
            oldPwdInput: document.getElementById('oldPwdInput'),
            newPwdInput: document.getElementById('newPwdInput'),
            confirmPwdInput: document.getElementById('confirmPwdInput'),
            pwdCancelBtn: document.getElementById('pwdCancelBtn'),
            pwdConfirmBtn: document.getElementById('pwdConfirmBtn'),
            // 提示框
            toast: document.getElementById('toast'),
            // 头像相关
            avatarPreviewWrapper: document.getElementById('avatarPreviewWrapper'),
            avatarPreviewImg: document.getElementById('avatarPreviewImg'),
            avatarPlaceholder: document.getElementById('avatarPlaceholder'),
            avatarFileInput: document.getElementById('avatarFileInput'),
            accountAvatar: document.getElementById('accountAvatar'),
            accountText: document.getElementById('accountText'),
            headerNickname: document.getElementById('headerNickname')
        };

        // 本地存储Key常量（登录状态使用sessionStorage实现每次会话需重新登录）
        const STORAGE_KEY = {
            LOGIN_STATUS: 'qinnian_login_status',
            USER_INFO: 'qinnian_user_info',
            PWD_MODIFY_TIME: 'qinnian_pwd_modify_time'
        };

        // 邀请码常量
        const VALID_INVITE_CODE = '5837490@QinNian';

        // 头像缩放最大尺寸
        const AVATAR_MAX_SIZE = 200;

        // 工具函数 - 提示框
        function showToast(message, type = 'success') {
            DOM.toast.textContent = message;
            DOM.toast.className = `toast show ${type}`;
            setTimeout(() => {
                DOM.toast.className = 'toast';
            }, 3000);
        }

        // 工具函数 - 获取本地存储用户信息（localStorage持久化）
        function getUserInfo() {
            const userInfo = localStorage.getItem(STORAGE_KEY.USER_INFO);
            return userInfo ? JSON.parse(userInfo) : {
                account: '',
                password: '',
                nickname: '',
                qinnianId: '5201314666',
                avatar: ''
            };
        }

        // 工具函数 - 保存用户信息到本地存储
        function saveUserInfo(userInfo) {
            localStorage.setItem(STORAGE_KEY.USER_INFO, JSON.stringify(userInfo));
        }

        // 工具函数 - 获取会话登录状态（sessionStorage，每次新会话需重新登录）
        function getSessionLoginStatus() {
            return sessionStorage.getItem(STORAGE_KEY.LOGIN_STATUS) === 'true';
        }

        // 工具函数 - 设置会话登录状态
        function setSessionLoginStatus(status) {
            if (status) {
                sessionStorage.setItem(STORAGE_KEY.LOGIN_STATUS, 'true');
            } else {
                sessionStorage.removeItem(STORAGE_KEY.LOGIN_STATUS);
            }
        }

        // 工具函数 - 检查登录状态
        function checkLoginStatus() {
            const isLogin = getSessionLoginStatus();
            if (isLogin) {
                DOM.loginMask.classList.add('hidden');
                document.body.classList.remove('no-scroll');
                loadUserInfoToPage();
                updateHeaderDisplay();
            } else {
                DOM.loginMask.classList.remove('hidden');
                document.body.classList.add('no-scroll');
            }
        }

        // 工具函数 - 加载用户信息到个人中心页面
        function loadUserInfoToPage() {
            const userInfo = getUserInfo();
            DOM.nicknameInput.value = userInfo.nickname || '';
            DOM.qinnianIdInput.value = userInfo.qinnianId;
            // 加载头像预览
            if (userInfo.avatar) {
                DOM.avatarPreviewImg.src = userInfo.avatar;
                DOM.avatarPreviewImg.classList.add('visible');
                DOM.avatarPlaceholder.classList.add('hidden');
            } else {
                DOM.avatarPreviewImg.src = '';
                DOM.avatarPreviewImg.classList.remove('visible');
                DOM.avatarPlaceholder.classList.remove('hidden');
            }
        }

        // 工具函数 - 更新顶部导航栏的头像和昵称显示
        function updateHeaderDisplay() {
            const userInfo = getUserInfo();
            // 更新头像
            if (userInfo.avatar) {
                DOM.accountAvatar.src = userInfo.avatar;
                DOM.accountAvatar.classList.add('visible');
                DOM.accountText.classList.add('hidden');
            } else {
                DOM.accountAvatar.src = '';
                DOM.accountAvatar.classList.remove('visible');
                DOM.accountText.classList.remove('hidden');
            }
            // 更新昵称
            const nickname = userInfo.nickname || '';
            DOM.headerNickname.textContent = nickname;
            if (nickname) {
                DOM.headerNickname.style.display = '';
            } else {
                DOM.headerNickname.style.display = 'none';
            }
        }

        // 工具函数 - 检查密码修改是否在冷却期
        function checkPwdModifyLimit() {
            const lastModifyTime = localStorage.getItem(STORAGE_KEY.PWD_MODIFY_TIME);
            if (!lastModifyTime) return true;
            const lastTime = new Date(lastModifyTime).getTime();
            const nowTime = new Date().getTime();
            const oneMonth = 30 * 24 * 60 * 60 * 1000;
            return nowTime - lastTime >= oneMonth;
        }

        // 头像上传处理
        DOM.avatarPreviewWrapper.addEventListener('click', () => {
            DOM.avatarFileInput.click();
        });

        DOM.avatarFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 校验文件类型
            if (!file.type.match(/image\/(jpeg|png|webp|gif|bmp)/)) {
                showToast('请选择jpg、png、webp、gif或bmp格式的图片', 'error');
                DOM.avatarFileInput.value = '';
                return;
            }

            // 校验文件大小（限制5MB）
            if (file.size > 5 * 1024 * 1024) {
                showToast('图片大小不能超过5MB', 'error');
                DOM.avatarFileInput.value = '';
                return;
            }

            // 使用FileReader读取并缩放图片
            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = new Image();
                img.onload = function() {
                    // 使用canvas缩放图片
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    // 计算缩放比例，使最大边不超过AVATAR_MAX_SIZE
                    if (width > height) {
                        if (width > AVATAR_MAX_SIZE) {
                            height = Math.round(height * (AVATAR_MAX_SIZE / width));
                            width = AVATAR_MAX_SIZE;
                        }
                    } else {
                        if (height > AVATAR_MAX_SIZE) {
                            width = Math.round(width * (AVATAR_MAX_SIZE / height));
                            height = AVATAR_MAX_SIZE;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // 获取base64（使用jpeg格式压缩，质量0.85）
                    const base64 = canvas.toDataURL('image/jpeg', 0.85);

                    // 保存到localStorage
                    const userInfo = getUserInfo();
                    userInfo.avatar = base64;
                    saveUserInfo(userInfo);

                    // 更新个人中心预览
                    DOM.avatarPreviewImg.src = base64;
                    DOM.avatarPreviewImg.classList.add('visible');
                    DOM.avatarPlaceholder.classList.add('hidden');

                    // 更新顶部导航栏
                    updateHeaderDisplay();

                    showToast('头像上传成功', 'success');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);

            // 清空input以便重复选择同一文件
            DOM.avatarFileInput.value = '';
        });

        // 登录相关逻辑 - 监听协议勾选和输入框变化
        function updateLoginBtnState() {
            const isChecked = DOM.agreementCheck.checked;
            const hasAccount = DOM.loginAccount.value.trim() !== '';
            const hasPassword = DOM.loginPassword.value.trim() !== '';
            const hasInviteCode = DOM.loginInviteCode.value.trim() !== '';
            DOM.loginSubmitBtn.disabled = !(isChecked && hasAccount && hasPassword && hasInviteCode);
        }

        DOM.agreementCheck.addEventListener('change', updateLoginBtnState);
        [DOM.loginAccount, DOM.loginPassword, DOM.loginInviteCode].forEach(input => {
            input.addEventListener('input', updateLoginBtnState);
        });

        // 登录按钮点击事件
        DOM.loginSubmitBtn.addEventListener('click', () => {
            const account = DOM.loginAccount.value.trim();
            const password = DOM.loginPassword.value.trim();
            const inviteCode = DOM.loginInviteCode.value.trim();

            // 表单校验
            if (!account) {
                showToast('请输入账号', 'error');
                return;
            }
            if (!password) {
                showToast('请输入密码', 'error');
                return;
            }
            if (!inviteCode) {
                showToast('请输入邀请码', 'error');
                return;
            }
            if (inviteCode !== VALID_INVITE_CODE) {
                showToast('邀请码错误，请重新输入', 'error');
                return;
            }
            if (!DOM.agreementCheck.checked) {
                showToast('请先同意用户协议与隐私策略', 'error');
                return;
            }

            // 保存用户信息到localStorage，登录状态到sessionStorage
            const existUserInfo = getUserInfo();
            const newUserInfo = {
                ...existUserInfo,
                account: account,
                password: password,
                nickname: existUserInfo.nickname || account
            };
            saveUserInfo(newUserInfo);
            setSessionLoginStatus(true);

            // 登录成功提示
            showToast('登录成功，欢迎回来', 'success');

            // 延迟隐藏弹窗
            setTimeout(() => {
                DOM.loginMask.classList.add('hidden');
                document.body.classList.remove('no-scroll');
                loadUserInfoToPage();
                updateHeaderDisplay();
                // 清空登录表单
                DOM.loginAccount.value = '';
                DOM.loginPassword.value = '';
                DOM.loginInviteCode.value = '';
                DOM.agreementCheck.checked = false;
                DOM.loginSubmitBtn.disabled = true;
            }, 800);
        });

        // 页面切换逻辑
        DOM.accountBtn.addEventListener('click', () => {
            // 检查会话登录状态
            if (!getSessionLoginStatus()) {
                showToast('请先登录', 'error');
                DOM.loginMask.classList.remove('hidden');
                document.body.classList.add('no-scroll');
                return;
            }
            DOM.homePage.classList.remove('active');
            DOM.profilePage.classList.add('active');
            loadUserInfoToPage();
            updateHeaderDisplay();
            triggerProfileAnimations();
        });

        DOM.backBtn.addEventListener('click', () => {
            DOM.profilePage.classList.remove('active');
            DOM.homePage.classList.add('active');
            updateHeaderDisplay();
            triggerCardAnimations();
        });

        DOM.cancelBtn.addEventListener('click', () => {
            loadUserInfoToPage();
            showToast('已取消修改', 'success');
        });

        DOM.saveBtn.addEventListener('click', () => {
            const nickname = DOM.nicknameInput.value.trim();
            if (nickname.length > 10) {
                showToast('昵称不能超过10个字', 'error');
                return;
            }

            const userInfo = getUserInfo();
            userInfo.nickname = nickname;
            saveUserInfo(userInfo);

            // 更新顶部导航栏昵称
            updateHeaderDisplay();

            showToast('昵称保存成功', 'success');
        });

        // 密码修改相关逻辑
        DOM.modifyPwdBtn.addEventListener('click', () => {
            if (!checkPwdModifyLimit()) {
                showToast('密码每月仅可修改一次，请下月再试', 'error');
                return;
            }
            DOM.passwordModalMask.classList.add('show');
            DOM.oldPwdInput.value = '';
            DOM.newPwdInput.value = '';
            DOM.confirmPwdInput.value = '';
        });

        DOM.pwdCancelBtn.addEventListener('click', () => {
            DOM.passwordModalMask.classList.remove('show');
        });

        DOM.pwdConfirmBtn.addEventListener('click', () => {
            const oldPwd = DOM.oldPwdInput.value.trim();
            const newPwd = DOM.newPwdInput.value.trim();
            const confirmPwd = DOM.confirmPwdInput.value.trim();
            const userInfo = getUserInfo();

            if (!oldPwd) {
                showToast('请输入原密码', 'error');
                return;
            }
            if (oldPwd !== userInfo.password) {
                showToast('原密码输入错误', 'error');
                return;
            }
            if (!newPwd) {
                showToast('请输入新密码', 'error');
                return;
            }
            if (newPwd.length < 6) {
                showToast('新密码长度不能少于6位', 'error');
                return;
            }
            if (newPwd !== confirmPwd) {
                showToast('两次输入的新密码不一致', 'error');
                return;
            }
            if (newPwd === oldPwd) {
                showToast('新密码不能与原密码相同', 'error');
                return;
            }

            userInfo.password = newPwd;
            saveUserInfo(userInfo);
            localStorage.setItem(STORAGE_KEY.PWD_MODIFY_TIME, new Date().toISOString());
            DOM.passwordModalMask.classList.remove('show');
            showToast('密码修改成功，请牢记新密码', 'success');
        });

        // 退出登录按钮点击事件
        DOM.logoutBtn.addEventListener('click', () => {
            // 清除会话登录状态（localStorage用户信息保留）
            setSessionLoginStatus(false);
            showToast('已退出登录', 'success');
            setTimeout(() => {
                window.location.reload();
            }, 800);
        });

        // 点击密码修改弹窗遮罩层关闭弹窗
        DOM.passwordModalMask.addEventListener('click', (e) => {
            if (e.target === DOM.passwordModalMask) {
                DOM.passwordModalMask.classList.remove('show');
            }
        });

        // 辅助函数 - 重新触发首页卡片入场动画
        function triggerCardAnimations() {
            const cards = document.querySelectorAll('.content-card');
            cards.forEach(card => {
                card.style.animation = 'none';
                card.offsetHeight;
                card.style.animation = '';
            });
            const homeTitle = document.querySelector('.home-title');
            if (homeTitle) {
                homeTitle.style.animation = 'none';
                homeTitle.offsetHeight;
                homeTitle.style.animation = '';
            }
            const homePageEl = DOM.homePage;
            homePageEl.classList.remove('active');
            homePageEl.offsetHeight;
            homePageEl.classList.add('active');
        }

        // 辅助函数 - 重新触发个人中心动画
        function triggerProfileAnimations() {
            const formItems = document.querySelectorAll('#profilePage .form-item');
            formItems.forEach(item => {
                item.style.animation = 'none';
                item.offsetHeight;
                item.style.animation = '';
            });
            const avatarFormItem = document.querySelector('#profilePage .avatar-form-item');
            if (avatarFormItem) {
                avatarFormItem.style.animation = 'none';
                avatarFormItem.offsetHeight;
                avatarFormItem.style.animation = '';
            }
            const logoutBtnEl = document.getElementById('logoutBtn');
            if (logoutBtnEl) {
                logoutBtnEl.style.animation = 'none';
                logoutBtnEl.offsetHeight;
                logoutBtnEl.style.animation = '';
            }
            const profileTitle = document.querySelector('.profile-title');
            if (profileTitle) {
                profileTitle.style.animation = 'none';
                profileTitle.offsetHeight;
                profileTitle.style.animation = '';
            }
            const btnGroup = document.querySelector('.profile-btn-group');
            if (btnGroup) {
                btnGroup.style.animation = 'none';
                btnGroup.offsetHeight;
                btnGroup.style.animation = '';
            }
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', () => {
            updateHeaderDisplay();
            checkLoginStatus();
        });

        // 实时监听：未登录时强制显示登录弹窗（检查sessionStorage）
        setInterval(() => {
            const isLogin = getSessionLoginStatus();
            if (!isLogin) {
                if (DOM.loginMask.classList.contains('hidden')) {
                    DOM.loginMask.classList.remove('hidden');
                    document.body.classList.add('no-scroll');
                }
            }
        }, 1000);

        // 页面可见性变化时重新校验（用户切换标签页回来时检查）
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                const isLogin = getSessionLoginStatus();
                if (!isLogin) {
                    DOM.loginMask.classList.remove('hidden');
                    document.body.classList.add('no-scroll');
                } else {
                    updateHeaderDisplay();
                }
            }
        });
    </script>
</body>
</html>
